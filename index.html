            'maldives': { localName: 'Dhivehi Raajje', name: '馬爾地夫', coords: [3.2, 73.2], isPort: true, market: ['coconut', 'fish', 'pandanus', 'souv_mv'], quakeRisk: 0.0, plateDesc: '遠離交界斷層' },
            'madagascar': { localName: 'Madagasikara', name: '馬達加斯加', coords: [-18.8, 47.5], isPort: true, market: ['yam', 'banana', 'pandanus', 'souv_mg'], quakeRisk: 0.0, plateDesc: '非洲板塊古老陸塊' },

        const totalSouvenirs = 22;
        const routes = {

            'micronesia': ['japan', 'palau', 'png', 'marshall'], 'marshall': ['micronesia', 'hawaii', 'solomon'],
            'solomon': ['png', 'marshall', 'vanuatu'], 'vanuatu': ['solomon', 'fiji'], 'fiji': ['vanuatu', 'samoa', 'nz', 'au_east'],
            'nz': ['fiji', 'tahiti', 'au_east'], 'samoa': ['fiji', 'tahiti', 'hawaii'],
            'tahiti': ['samoa', 'hawaii', 'nz', 'rapanui'], 'hawaii': ['japan', 'marshall', 'samoa', 'tahiti'], 
            'rapanui': ['tahiti', 'south_america'], 'south_america': ['rapanui']
        };

        function initGameConfig() {
            for (let key in items) {
                if (items[key].type === 'food') items[key].energy = Math.floor(Math.random() * 6) + 5; 
                else if (items[key].type === 'souvenir') items[key].baseValue = Math.floor(Math.random() * 8) * 10 + 60; 
            }
        }
        initGameConfig();

        let player = { 
            location: 'taiwan', 
            visited: new Set(['taiwan']), 
            stamina: 100, 
            maxStamina: 100, 
            inventory: { 'taro': 15, 'fish': 5, 'bamboo': 5 },
            gatherCount: 0, maxGather: 5
        };
        let isNavigating = false;
        let activePath = []; 
        let finalDestination = null; 

        let gatherTimer = null;
        let gatherTimeLeft = 0;
        let toastTimeout = null; 

        const mapBounds = [[-70, -60], [70, 390]]; 
        const map = L.map('real-map', { zoomControl: false, worldCopyJump: false, maxBounds: mapBounds, maxBoundsViscosity: 1.0, minZoom: 3 }).setView([15.0, 135.0], 4);
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);

        const markerGroup = L.layerGroup().addTo(map);
        const flightPathGroup = L.layerGroup().addTo(map);
        const shipGroup = L.layerGroup().addTo(map);

        function getCanoeIcon(isWest) {
            const transformScale = isWest ? 'scaleX(-1)' : 'scaleX(1)';
            return `<div style="width:70px; height:70px; filter:drop-shadow(0 5px 10px rgba(0, 0, 0, 0.7)); transform: ${transformScale};">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 10 80 C 30 90, 70 90, 90 80 C 70 85, 30 85, 10 80 Z" fill="#795548"/>
                    <line x1="35" y1="83" x2="35" y2="95" stroke="#5d4037" stroke-width="2"/>
                    <line x1="65" y1="83" x2="65" y2="95" stroke="#5d4037" stroke-width="2"/>
                    <path d="M 25 95 C 45 99, 55 99, 75 95 C 55 97, 45 97, 25 95 Z" fill="#8d6e63"/>
                    <line x1="85" y1="75" x2="20" y2="60" stroke="#5d4037" stroke-width="3"/>
                    <line x1="85" y1="75" x2="35" y2="10" stroke="#5d4037" stroke-width="3"/>
                    <path d="M 85 75 L 35 10 Q 55 45 20 60 Z" fill="#ffecb3" stroke="#ffc107" stroke-width="2"/>
                </svg>
            </div>`;
        }

        function drawMapMarkers() {
            markerGroup.clearLayers();
            for (const [key, loc] of Object.entries(locations)) {
                if (!loc.isPort) continue;
                
                const isCurrent = key === player.location;
                const isVisited = player.visited.has(key);
                
                const souvItemKey = loc.market.find(id => items[id].type === 'souvenir');
                const displayEmoji = souvItemKey ? items[souvItemKey].emoji : '📍';

                let iconClass = 'unvisited';
                if (isCurrent) iconClass = 'current';
                else if (isVisited) iconClass = 'visited';

                const icon = L.divIcon({
                    className: '',
                    html: `<div class="custom-map-icon ${iconClass}" style="width: ${isCurrent?60:50}px; height: ${isCurrent?60:50}px; font-size: 28px;">${displayEmoji}</div>`,
                    iconSize: [isCurrent?60:50, isCurrent?60:50], iconAnchor: [isCurrent?30:25, isCurrent?30:25]
                });
                
                const marker = L.marker(loc.coords, { icon: icon }).addTo(markerGroup);
                
                const marketItemsStr = loc.market.map(itemId => {
                    const i = items[itemId];
                    return `<span class="inline-flex items-center gap-1">${i.emoji} ${i.name}</span>`;
                }).join('、');

                let riskStr = '極低'; let riskColor = 'text-emerald-400';
                if(loc.quakeRisk >= 0.3) { riskStr = '高風險'; riskColor = 'text-rose-400'; }
                else if(loc.quakeRisk >= 0.15) { riskStr = '中等'; riskColor = 'text-amber-400'; }
                else if(loc.quakeRisk > 0) { riskStr = '微弱'; riskColor = 'text-blue-300'; }

                const tooltipHtml = `
                    <div class="text-xl font-black text-cyan-400 mb-2 border-b border-slate-700 pb-2">
                        ${loc.localName} <span class="text-white font-normal text-base ml-1">(${loc.name})</span>
                    </div>
                    <div class="text-xs bg-slate-800 p-2 rounded mb-2 border border-slate-700">
                        <span class="text-slate-300">🌍 地質：${loc.plateDesc}</span><br>
                        <span class="text-slate-300">🌋 地震中斷風險：</span><span class="font-bold ${riskColor}">${riskStr} (${Math.round(loc.quakeRisk*100)}%)</span>
                    </div>
                    <div class="text-sm ${isVisited ? 'text-emerald-400' : 'text-slate-400'} mb-1 font-bold">
                        ${isVisited ? '📦 已探索港口物資：' : '❓ 未知物資情報：'}
                    </div>
                    <div class="text-base text-slate-300 leading-relaxed">${marketItemsStr}</div>
                `;
                marker.bindTooltip(tooltipHtml, { direction: 'top', className: 'custom-tooltip', offset: [0, -25] });
                marker.on('click', () => { handleTravelClick(key); });
            }
        }

        function calculateDistance(c1, c2) {
            const R = 6371; const dLat = (c2[0] - c1[0]) * Math.PI / 180; const dLon = (c2[1] - c1[1]) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(c1[0] * Math.PI / 180) * Math.cos(c2[0] * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function findShortestPath(start, end) {
            const dist = {}; const prev = {}; const q = new Set(Object.keys(locations));
            for (let node of q) { dist[node] = Infinity; prev[node] = null; }
            dist[start] = 0;
            while (q.size > 0) {
                let u = null;
                for (let node of q) { if (u === null || dist[node] < dist[u]) u = node; }
                if (u === end || dist[u] === Infinity) break;
                q.delete(u);
                for (let neighbor of routes[u] || []) {
                    if (q.has(neighbor)) {
                        const alt = dist[u] + calculateDistance(locations[u].coords, locations[neighbor].coords);
                        if (alt < dist[neighbor]) { dist[neighbor] = alt; prev[neighbor] = u; }
                    }
                }
            }
            const path = []; let curr = end;
            while (curr !== null) { path.unshift(curr); curr = prev[curr]; }
            return path[0] === start ? path : [];
        }

        function showToast(contentHtml, borderColor = 'cyan', duration = 5000) {
            const toast = document.getElementById('toast-container');
            toast.innerHTML = contentHtml;
            toast.className = `absolute top-12 left-1/2 z-[2000] bg-slate-900/95 border-4 border-${borderColor}-500 px-8 py-5 rounded-2xl shadow-lg text-white text-xl font-bold text-center flex flex-col items-center gap-2 toast-show`;
            
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.replace('toast-show', 'toast-hide');
            }, duration);
        }

        async function handleTravelClick(destKey) {
            if (isNavigating || destKey === player.location) return;

            if (activePath.length > 1) {
                if (!confirm(`目前正在前往【${locations[finalDestination].name}】。\n確定要放棄原航線，改往【${locations[destKey].name}】嗎？`)) return;
            } else {
                if (!confirm(`確定要拔錨啟航，前往【${locations[destKey].name}】嗎？`)) return;
            }

            const path = findShortestPath(player.location, destKey);
            if (path.length < 2) return alert("無法找到安全航線！");

            finalDestination = destKey;
            activePath = path;
            await proceedToNextStop();
        }

        window.cancelGathering = function(showAlert = true) {
            if (gatherTimer) {
                clearInterval(gatherTimer);
                gatherTimer = null;
                player.stamina += 3; 
                if (showAlert) alert("你離開了市場，採集被迫中斷！(體力已返還)");
                window.updateUI();
            }
        };

        window.proceedToNextStop = async function() {
            if (activePath.length < 2 || isNavigating) return;
            
            if (marketOpen) toggleMarket(); 
            cancelGathering(false); 

            let nextStopIndex = 1;
            let actualDest = activePath[1];
            for (let i = 1; i < activePath.length; i++) {
                if (locations[activePath[i]].isPort || i === activePath.length - 1) { actualDest = activePath[i]; nextStopIndex = i; break; }
            }

            const pathSegment = activePath.slice(0, nextStopIndex + 1);
            let totalDist = 0;
            for (let i = 0; i < pathSegment.length - 1; i++) totalDist += calculateDistance(locations[pathSegment[i]].coords, locations[pathSegment[i+1]].coords);
            const staminaCost = Math.max(2, Math.floor(totalDist / 400));

            if (player.stamina < staminaCost) return alert(`體力不足！航行至下一站需要 ${staminaCost} 點體力。`);

            isNavigating = true;
            player.stamina -= staminaCost;
            window.updateUI();

            flightPathGroup.clearLayers(); shipGroup.clearLayers();
            const fullPathCoords = pathSegment.map(node => locations[node].coords);
            L.polyline(fullPathCoords, { color: '#0ea5e9', weight: 4, className: 'travel-line' }).addTo(flightPathGroup);

            const isHeadingWest = (locations[actualDest].coords[1] - locations[player.location].coords[1]) < 0;

            const shipMarker = L.marker(locations[player.location].coords, { 
                icon: L.divIcon({ className:'', html: getCanoeIcon(isHeadingWest), iconSize:[70,70], iconAnchor:[-15, 60]}) 
            }).addTo(shipGroup);

            const totalDurationMs = (pathSegment.length - 1) * 800; 
            map.flyTo(locations[actualDest].coords, map.getZoom(), { animate: true, duration: totalDurationMs / 1000 });

            let startTime = null;
            await new Promise(resolve => {
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    let progress = Math.min((timestamp - startTime) / totalDurationMs, 1);
                    let currSeg = Math.min(Math.floor(progress * (pathSegment.length - 1)), (pathSegment.length - 1) - 1);
                    let segProg = (progress * (pathSegment.length - 1)) - currSeg;
                    const p1 = fullPathCoords[currSeg]; const p2 = fullPathCoords[currSeg + 1];
                    shipMarker.setLatLng([p1[0] + (p2[0] - p1[0]) * segProg, p1[1] + (p2[1] - p1[1]) * segProg]);
                    if (progress < 1) requestAnimationFrame(step); else resolve();
                }
                requestAnimationFrame(step);
            });

            player.location = actualDest;
            player.visited.add(actualDest); 
            activePath = activePath.slice(nextStopIndex);
            
            let eventLog = "";
            let borderColor = 'cyan';

            // 1. 捕獲魚類 (30%)
            if (Math.random() < 0.3) {
                player.inventory['fish'] = (player.inventory['fish'] || 0) + 1;
                eventLog += `<div class="bg-blue-900/80 p-2 rounded mb-2 text-blue-300 border border-blue-500 text-base">🐟 航行途中幸運地捕獲了 1 個魚乾！</div>`;
            }

            // 2. 海上掠奪者 (20%)
            if (Math.random() < 0.2) {
                borderColor = 'rose';
                const stealable = Object.keys(player.inventory).filter(id => items[id].type !== 'souvenir');
                if (stealable.length > 0) {
                    const stolenId = stealable[Math.floor(Math.random() * stealable.length)];
                    const stolenAmount = Math.min(player.inventory[stolenId], Math.floor(Math.random() * 2) + 1);
                    player.inventory[stolenId] -= stolenAmount;
                    if (player.inventory[stolenId] === 0) delete player.inventory[stolenId];
                    eventLog += `<div class="bg-rose-900/80 p-2 rounded mb-2 text-rose-300 border border-rose-500 text-base">🏴‍☠️ 遭遇海上掠奪者！被搶走了 ${stolenAmount} 個 ${items[stolenId].name}。</div>`;
                } else {
                    const dmg = 10;
                    player.stamina -= dmg;
                    eventLog += `<div class="bg-rose-900/80 p-2 rounded mb-2 text-rose-300 border border-rose-500 text-base">🏴‍☠️ 遭遇掠奪者！殊死抵抗流失了 ${dmg} 點體力。</div>`;
                }
            }

            // 3. 遭遇風暴
            if (Math.random() < 0.25) {
                let plantUsed = null;
                for (let itemId in player.inventory) { if (items[itemId].type === 'plant' && player.inventory[itemId] > 0) { plantUsed = itemId; break; } }
                
                if (plantUsed) {
                    player.inventory[plantUsed] -= 1; if (player.inventory[plantUsed] === 0) delete player.inventory[plantUsed];
                    eventLog += `<div class="bg-emerald-900/80 p-2 rounded mb-2 text-emerald-300 border border-emerald-500 text-base">🌪️ 遭遇風暴！消耗「${items[plantUsed].name}」補強船隻，安然度過。</div>`;
                    if (borderColor !== 'rose') borderColor = 'emerald'; 
                } else {
                    const stormDmg = Math.floor(Math.random() * 16) + 5; player.stamina -= stormDmg;
                    eventLog += `<div class="bg-rose-900/80 p-2 rounded mb-2 text-rose-300 border border-rose-500 text-base">🌪️ 遭遇猛烈風暴！船隻受損，流失了 ${stormDmg} 點體力。</div>`;
                    borderColor = 'rose';
                }
            }

            isNavigating = false;
            player.gatherCount = 0; 
            flightPathGroup.clearLayers(); shipGroup.clearLayers();
            drawMapMarkers();

            L.marker(locations[player.location].coords, { 
                icon: L.divIcon({ className:'', html: getCanoeIcon(false), iconSize:[70,70], iconAnchor:[-15, 60]}) 
            }).addTo(shipGroup);

            if (activePath.length <= 1) {
                activePath = [];
                finalDestination = null;
                showToast(eventLog + `🛶 成功抵達目的地：<span class="text-cyan-400">${locations[player.location].name}</span>！`, borderColor, 5000);
            } else {
                showToast(eventLog + `🛶 抵達中繼港口：<span class="text-emerald-400">${locations[player.location].name}</span><br><span class="text-base font-normal text-slate-300 mt-1 block">可補給後繼續航行。</span>`, borderColor, 5000);
            }

            window.updateUI();
            checkLowStamina();
        };

        function checkLowStamina() {
            if (player.stamina > 0 && player.stamina <= 20) setTimeout(() => { alert("⚠️ 警告：體力過低 (低於 20)！請盡快補充食物！"); }, 800);
            else if (player.stamina <= 0) setTimeout(() => { alert("💀 體力耗盡... 你的南島貿易之旅結束了。"); location.reload(); }, 800);
        }

        window.gatherResources = function() {
            if (gatherTimer) return; 
            if (player.gatherCount >= player.maxGather) return alert("這個港口的資源已經被你採集光了！");
            if (player.stamina < 3) return alert("體力不足以進行採集！(需要 3 點)");

            player.stamina -= 3;
            gatherTimeLeft = 10;
            updateGatherBtnUI();
            window.updateUI(); 
            
            gatherTimer = setInterval(() => {
                gatherTimeLeft--;
                if (gatherTimeLeft <= 0) {
                    clearInterval(gatherTimer);
                    gatherTimer = null;
                    completeGathering();
                } else {
                    updateGatherBtnUI();
                }
            }, 1000);
        };

        function completeGathering() {
            const curLoc = locations[player.location];

            if (curLoc.quakeRisk && Math.random() < curLoc.quakeRisk) {
                const dmg = Math.floor(Math.random() * 5) + 3; 
                player.stamina -= dmg;
                player.gatherCount++; 
                
                showToast(`🌋 突發強烈地震！採集被迫中斷，即將入手的物資掉落消失，並流失了 <span class="text-rose-400">${dmg}</span> 點體力。`, 'rose', 4000);
                
                window.updateUI();
                checkLowStamina();
                return; 
            }

            const gatherable = curLoc.market.filter(id => items[id].type === 'food' || items[id].type === 'plant');
            if (gatherable.length === 0) {
                alert("這裡沒有可以採集的自然資源！");
                player.stamina += 3; 
                window.updateUI();
                return;
            }

            const randItem = gatherable[Math.floor(Math.random() * gatherable.length)];
            const amount = Math.floor(Math.random() * 2) + 1;
            player.gatherCount++;
            player.inventory[randItem] = (player.inventory[randItem] || 0) + amount;
            
            showToast(`🌿 採集成功！獲得了 <span class="text-emerald-400">${amount} 個 ${items[randItem].name}</span>`, 'emerald', 3000);

            window.updateUI(); 
            checkLowStamina();
        }

        window.tradeItem = function(localItemId, invItemId) {
            const lItem = items[localItemId];
            const iItem = items[invItemId];

            if (!confirm(`確定要用你的【${iItem.name}】交換當地的【${lItem.name}】嗎？`)) return;

            const lVal = lItem.baseValue;
            const isLocal = locations[player.location].market.includes(invItemId);
            const offerVal = iItem.baseValue * (isLocal ? 1 : 1.5);

            if (offerVal >= lVal) {
                let gain = Math.floor(offerVal / lVal);
                if (gain > 3) gain = 3; 
                player.inventory[invItemId] -= 1;
                player.inventory[localItemId] = (player.inventory[localItemId] || 0) + gain;
            } else {
                const cost = Math.ceil(lVal / offerVal);
                if (player.inventory[invItemId] < cost) return alert("數量不足，無法交換！");
                player.inventory[invItemId] -= cost;
                player.inventory[localItemId] = (player.inventory[localItemId] || 0) + 1;
            }

            if (player.inventory[invItemId] === 0) delete player.inventory[invItemId];
            window.updateUI();

            let sovCount = 0;
            for (let id in player.inventory) { if (items[id].type === 'souvenir') sovCount++; }
            if (sovCount >= totalSouvenirs) setTimeout(() => { alert("🎉 太神啦！你成功收集了所有據點的紀念品，完成了大洋貿易之旅！"); }, 500);
        };

        window.useFood = function(id) {
            if (player.stamina >= player.maxStamina) return alert("體力已滿，不需要再吃啦！");
            if (!confirm(`確定要吃掉 1 個 【${items[id].name}】 嗎？\n(✨ 吃下可恢復 ${items[id].energy} 點體力)`)) return;

            if (player.inventory[id] > 0) {
                player.stamina = Math.min(player.maxStamina, player.stamina + items[id].energy);
                player.inventory[id] -= 1;
                if (player.inventory[id] === 0) delete player.inventory[id];
                window.updateUI();
            }
        };

        let marketOpen = false; 
        window.toggleMarket = function() { 
            marketOpen = !marketOpen; 
            const panel = document.getElementById('market-panel');
            const handle = document.getElementById('market-handle');
            if (marketOpen) {
                panel.style.transform = 'translateX(0)';
                handle.innerHTML = '◀';
            } else {
                panel.style.transform = 'translateX(-100%)';
                handle.innerHTML = '▶';
                if (gatherTimer) cancelGathering(true);
            }
        };
        
        let invOpen = false; window.toggleInventory = function() { invOpen = !invOpen; document.getElementById('inventory-modal').style.display = invOpen ? 'flex' : 'none'; };
        let souvOpen = false; window.toggleSouvenirCollection = function() { souvOpen = !souvOpen; document.getElementById('souvenir-modal').style.display = souvOpen ? 'flex' : 'none'; };

        function updateGatherBtnUI() {
            const btnGather = document.getElementById('btn-gather');
            if (!btnGather) return;
            
            if (gatherTimer) {
                btnGather.innerHTML = `採集中... ${gatherTimeLeft}s`;
                btnGather.classList.add('bg-slate-600', 'cursor-not-allowed', 'opacity-80');
                btnGather.classList.remove('bg-emerald-700', 'hover:bg-emerald-600');
            } else {
                btnGather.innerHTML = `開始採集 (<span id="gather-count">${player.gatherCount}</span>/${player.maxGather})`;
                btnGather.classList.remove('bg-slate-600', 'cursor-not-allowed', 'opacity-80');
                btnGather.classList.add('bg-emerald-700', 'hover:bg-emerald-600');
                
                if(player.gatherCount >= player.maxGather) { 
                    btnGather.classList.add('opacity-50', 'cursor-not-allowed'); 
                    btnGather.disabled = true; 
                } else { 
                    btnGather.classList.remove('opacity-50', 'cursor-not-allowed'); 
                    btnGather.disabled = false; 
                }
            }
        }

        window.updateUI = function() {
            let sovCount = 0; const mySouvenirs = [];
            for (let id in player.inventory) { if (items[id].type === 'souvenir') { sovCount++; mySouvenirs.push(items[id]); } }
            document.getElementById('ui-souvenirs').textContent = `${sovCount} / ${totalSouvenirs}`;
            
            const staminaEl = document.getElementById('ui-stamina');
            staminaEl.textContent = `${player.stamina}/${player.maxStamina}`;
            if(player.stamina <= 20) staminaEl.classList.replace('text-white', 'text-rose-500');
            else staminaEl.classList.replace('text-rose-500', 'text-white');
            
            const invStaminaEl = document.getElementById('inv-stamina-display');
            invStaminaEl.textContent = `⚡ 目前體力: ${player.stamina}/${player.maxStamina}`;
            if(player.stamina <= 20) { invStaminaEl.classList.replace('text-emerald-400', 'text-rose-400'); invStaminaEl.classList.replace('border-emerald-700/50', 'border-rose-700/50'); }
            else { invStaminaEl.classList.replace('text-rose-400', 'text-emerald-400'); invStaminaEl.classList.replace('border-rose-700/50', 'border-emerald-700/50'); }

            const curLoc = locations[player.location];
            document.getElementById('current-location-text').textContent = `停泊港口: ${curLoc.localName} (${curLoc.name})`;
            document.getElementById('market-name').textContent = curLoc.localName;

            const btnContinue = document.getElementById('btn-continue');
            if (activePath.length > 1 && !isNavigating && finalDestination) {
                btnContinue.classList.remove('hidden');
                btnContinue.innerHTML = `🌊 繼續航行前往下一站<div class="text-lg font-normal mt-1 opacity-80">(最終目的地: ${locations[finalDestination].name})</div>`;
            } else {
                if(btnContinue) btnContinue.classList.add('hidden');
            }

            updateGatherBtnUI();

            const invContainer = document.getElementById('inventory-list');
            invContainer.innerHTML = '';
            if (Object.keys(player.inventory).length === 0) invContainer.innerHTML = '<div class="text-center text-slate-500 py-10 text-xl">背包空空如也，快去交換物資！</div>';
            else {
                const catFood = []; const catPlant = []; const catSouv = [];
                for (const [id, count] of Object.entries(player.inventory)) {
                    const item = items[id];
                    let emojiHtml = item.emoji.includes('<svg') ? item.emoji : `<span class="text-5xl">${item.emoji}</span>`;
                    const html = `
                        <div class="flex justify-between items-center bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-md mb-3">
                            <div class="flex items-center gap-6">
                                ${emojiHtml}
                                <div>
                                    <div class="text-xl font-bold text-white">${item.name} <span class="text-amber-500 ml-3 text-2xl">x${count}</span></div>
                                    <div class="text-base text-slate-400 mt-1">${item.desc}</div>
                                    ${item.type === 'food' ? `<div class="text-sm text-emerald-400 mt-1.5 font-bold">✨ 吃下恢復 ${item.energy} 點體力</div>` : ''}
                                </div>
                            </div>
                            ${item.type === 'food' ? `<button onclick="useFood('${id}')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xl px-8 py-4 rounded-xl font-bold shadow-lg transition transform hover:scale-105">食用</button>` : ''}
                        </div>`;
                    if(item.type === 'food') catFood.push(html); else if(item.type === 'plant') catPlant.push(html); else if(item.type === 'souvenir') catSouv.push(html);
                }
                if(catFood.length > 0) invContainer.innerHTML += `<h3 class="text-emerald-400 text-2xl font-black tracking-widest border-b-2 border-slate-700 pb-3 mb-4 mt-2">🍎 食糧</h3>` + catFood.join('');
                if(catPlant.length > 0) invContainer.innerHTML += `<h3 class="text-blue-400 text-2xl font-black tracking-widest border-b-2 border-slate-700 pb-3 mb-4 mt-6">🌿 防禦與修補</h3>` + catPlant.join('');
                if(catSouv.length > 0) invContainer.innerHTML += `<h3 class="text-amber-400 text-2xl font-black tracking-widest border-b-2 border-slate-700 pb-3 mb-4 mt-6">🏆 特色紀念品</h3>` + catSouv.join('');
            }

            const souvContainer = document.getElementById('souvenir-collection-list');
            souvContainer.innerHTML = '';
            if (mySouvenirs.length === 0) souvContainer.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10 text-xl">尚未收集到任何紀念品，繼續航行吧！</div>';
            else {
                mySouvenirs.forEach(item => {
                    let emojiHtml = item.emoji.includes('<svg') ? `<div style="font-size:4rem;" class="mb-4">${item.emoji}</div>` : `<span class="text-6xl mb-4">${item.emoji}</span>`;
                    souvContainer.innerHTML += `
                        <div class="bg-slate-800 p-6 rounded-2xl border-2 border-amber-900/50 flex flex-col items-center text-center shadow-lg hover:border-amber-500 transition">
                            ${emojiHtml}
                            <div class="text-xl font-bold text-amber-400 mb-2">${item.name}</div>
                            <div class="text-sm text-slate-400">${item.desc}</div>
                        </div>`;
                });
            }

            const mktContainer = document.getElementById('market-list');
            mktContainer.innerHTML = '';
            if (Object.keys(player.inventory).length === 0) mktContainer.innerHTML = '<div class="text-center text-slate-500 py-10 text-base">背包沒有物資可以交換</div>';
            else {
                for (const localId of curLoc.market) {
                    const lItem = items[localId]; const lVal = lItem.baseValue;
                    const localTypeStr = typeMap[lItem.type];
                    let lEmojiHtml = lItem.emoji.includes('<svg') ? `<div style="font-size:2.5rem;">${lItem.emoji}</div>` : `<span class="text-4xl">${lItem.emoji}</span>`;
                    
                    let tradeButtons = '';
                    for (const [invId, count] of Object.entries(player.inventory)) {
                        if (invId === localId) continue;
                        const iItem = items[invId]; const isLocal = curLoc.market.includes(invId);
                        const offerVal = iItem.baseValue * (isLocal ? 1 : 1.5);
                        
                        let iEmojiHtml = iItem.emoji.includes('<svg') ? iItem.emoji : iItem.emoji;
                        let lEmojiSmall = lItem.emoji.includes('<svg') ? lItem.emoji : lItem.emoji;

                        let btnText = ''; let canTrade = false;
                        if (offerVal >= lVal) {
                            let gain = Math.floor(offerVal / lVal);
                            if (gain > 3) gain = 3; 
                            btnText = `用 1個 ${iEmojiHtml}${iItem.name}(${typeMap[iItem.type]}) 換 ${gain}個 ${lEmojiSmall}${lItem.name}(${localTypeStr})`; 
                            canTrade = count >= 1;
                        } else {
                            const cost = Math.ceil(lVal / offerVal);
                            btnText = `用 ${cost}個 ${iEmojiHtml}${iItem.name}(${typeMap[iItem.type]}) 換 1個 ${lEmojiSmall}${lItem.name}(${localTypeStr})`; 
                            canTrade = count >= cost;
                        }
                        tradeButtons += `<button onclick="tradeItem('${localId}', '${invId}')" ${!canTrade?'disabled':''} class="${canTrade?'bg-slate-700 hover:bg-slate-600':'bg-slate-800 opacity-30 cursor-not-allowed'} border border-slate-600 text-white text-base py-3 px-4 rounded w-full flex justify-between transition focus:outline-none mb-3 shadow-sm"><span class="text-slate-100 flex items-center gap-2">${btnText}</span></button>`;
                    }
                    mktContainer.innerHTML += `
                        <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 shadow-md">
                            <div class="flex items-center gap-4 mb-4 pb-4 border-b border-slate-800">
                                ${lEmojiHtml}
                                <div class="text-xl font-bold text-cyan-400">${lItem.name} <span class="text-sm text-amber-500/80 ml-1">(${localTypeStr})</span></div>
                            </div>
                            <div class="flex flex-col gap-2 w-full">${tradeButtons}</div>
                        </div>`;
                }
            }
        };

        setTimeout(() => { 
            map.invalidateSize(); 
            drawMapMarkers(); 
            L.marker(locations[player.location].coords, { 
                icon: L.divIcon({ className:'', html: getCanoeIcon(false), iconSize:[70,70], iconAnchor:[-15, 60]}) 
            }).addTo(shipGroup);
            window.updateUI(); 
        }, 500);
        
    </script>
</body>
</html>
